<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Spread | Live Intelligence Terminal</title>

<!-- Stable Core Frameworks -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  :root {
    --canvas: #EEF0F3; --canvas-alt: #E5E7EB;
    --ink: #14151A; --ink-soft: #5A5C66; --ink-faint: #8A8C95;
    --hairline: rgba(20,21,26,0.09);
    
    --glass-bg: rgba(255,255,255,0.55); --glass-bg-strong: rgba(255,255,255,0.74);
    --glass-border: rgba(255,255,255,0.7); --glass-shadow: rgba(20,21,26,0.08);
    
    --brass: #A9824C; --brass-soft: rgba(169,130,76,0.14);
    
    --lean-left: #2F62D6; --lean-left-bg: rgba(47,98,214,0.09);
    --lean-center: #756AA0; --lean-center-bg: rgba(117,106,160,0.09);
    --lean-right: #B3473A; --lean-right-bg: rgba(179,71,58,0.09);
    
    --font-display: -apple-system, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    --font-body: -apple-system, "SF Pro Text", system-ui, sans-serif;
    --font-serif: ui-serif, "New York", "Iowan Old Style", Georgia, serif;
  }

  [data-theme="dark"] {
    --canvas: #000000; --canvas-alt: #0A0A0C;
    --ink: #F2F2F4; --ink-soft: #A0A2AC; --ink-faint: #6E707A;
    --hairline: rgba(255,255,255,0.10);
    
    --glass-bg: rgba(30,30,34,0.55); --glass-bg-strong: rgba(34,34,38,0.76);
    --glass-border: rgba(255,255,255,0.09); --glass-shadow: rgba(0,0,0,0.55);
    
    --brass: #CDA66E; --brass-soft: rgba(205,166,110,0.16);
    --lean-left: #6892F2; --lean-left-bg: rgba(104,146,242,0.14);
    --lean-center: #A498D0; --lean-center-bg: rgba(164,152,208,0.14);
    --lean-right: #D6837A; --lean-right-bg: rgba(214,131,122,0.14);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--canvas); font-family: var(--font-body); color: var(--ink); transition: background 0.3s ease, color 0.3s ease; }

  .desktop-layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

  .sidebar { background: var(--glass-bg-strong); backdrop-filter: blur(32px) saturate(200%); -webkit-backdrop-filter: blur(32px) saturate(200%); border-right: 1px solid var(--hairline); display: flex; flex-direction: column; padding: 24px 16px; z-index: 50; }
  .wordmark { font-family: var(--font-display); font-weight: 800; font-size: 24px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; margin-bottom: 32px; padding-left: 8px; }
  .wordmark .tick { width: 12px; height: 3px; background: var(--brass); border-radius: 2px; }
  .nav-group { margin-bottom: 28px; }
  .nav-label { font-size: 11px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding-left: 12px; }
  .nav-item { display: flex; align-items: center; justify-content: space-between; width: 100%; appearance: none; border: none; background: transparent; color: var(--ink-soft); font-size: 13.5px; font-weight: 500; padding: 8px 12px; border-radius: 8px; cursor: pointer; text-align: left; transition: all 0.15s; margin-bottom: 2px; }
  .nav-item:hover { background: var(--hairline); color: var(--ink); }
  .nav-item.active { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--ink); box-shadow: 0 4px 12px var(--glass-shadow); font-weight: 600; }
  .nav-count { font-size: 11px; font-family: monospace; opacity: 0.5; background: var(--hairline); padding: 2px 6px; border-radius: 6px; }

  .main-stage { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .topbar { height: 64px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--hairline); background: var(--canvas); z-index: 40; }
  .search-bar { display: flex; align-items: center; gap: 10px; background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 6px 16px; border-radius: 100px; width: 420px; }
  .search-bar input { border: none; background: transparent; outline: none; color: var(--ink); font-size: 13.5px; width: 100%; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }
  .btn-icon { appearance: none; border: 1px solid var(--hairline); background: var(--glass-bg); color: var(--ink); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  
  .scroll-area { flex: 1; overflow-y: auto; padding: 40px 40px 120px; }
  
  .glass-card { position: relative; border-radius: 20px; margin-bottom: 24px; z-index: 1; display: flex; flex-direction: column; background: transparent; }
  .glass-layers { position: absolute; inset: 0; border-radius: 20px; overflow: hidden; box-shadow: 0 12px 32px var(--glass-shadow); z-index: -1; }
  .glass-filter { position: absolute; inset: 0; background: var(--glass-bg); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); }
  .glass-overlay { position: absolute; inset: -50px; background: radial-gradient(circle at 0% 0%, rgba(255,255,255,0.3) 0%, transparent 60%); filter: url(#glass-distortion); opacity: 0.25; pointer-events: none; mix-blend-mode: overlay; }
  .glass-specular { position: absolute; inset: 0; border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: inset 0 1px 1px rgba(255,255,255,0.3); pointer-events: none; }
  .glass-content { position: relative; padding: 26px; z-index: 2; flex: 1; display: flex; flex-direction: column; }

  .eyebrow-tag { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--brass); margin-bottom: 8px; display: block; }
  .headline { font-family: var(--font-display); font-weight: 700; font-size: 19px; line-height: 1.28; letter-spacing: -0.2px; margin: 0 0 8px; color: var(--ink); }
  .snippet { font-size: 14px; line-height: 1.5; color: var(--ink-soft); margin: 0 0 14px; }
  .byline { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-faint); margin-bottom: 14px; font-weight: 500; }

  .grid-terminal { display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 24px; }
  .full-width-hero { grid-column: 1 / -1; }

  .bias-hit-area { padding: 10px 0; margin: -6px 0 2px 0; cursor: crosshair; }
  .biasbar { display: flex; height: 8px; border-radius: 6px; overflow: hidden; border: 1px solid var(--hairline); }
  .biasbar span { display: block; height: 100%; transition: filter 0.25s ease, transform 0.2s ease; }
  .bias-hit-area:hover .biasbar span { filter: grayscale(0.4) opacity(0.5); }
  .bias-hit-area:hover .biasbar span.active { filter: grayscale(0) opacity(1) brightness(1.05); transform: scaleY(1.25); }
  .seg-left { background: var(--lean-left); } .seg-center { background: var(--lean-center); } .seg-right { background: var(--lean-right); }

  .leanwrap { display: flex; flex-direction: column; }
  .leanrow { border-radius: 12px; font-size: 13px; line-height: 1.55; max-height: 0; opacity: 0; overflow: hidden; padding: 0 14px; margin-bottom: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
  .leanrow.expanded { max-height: 280px; opacity: 1; padding: 14px; margin-bottom: 8px; margin-top: 10px; }
  .leanrow .tag { font-family: var(--font-display); font-weight: 700; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .leanrow.l { background: var(--lean-left-bg); border-left: 3px solid var(--lean-left); } .leanrow.l .tag { color: var(--lean-left); }
  .leanrow.c { background: var(--lean-center-bg); border-left: 3px solid var(--lean-center); } .leanrow.c .tag { color: var(--lean-center); }
  .leanrow.r { background: var(--lean-right-bg); border-left: 3px solid var(--lean-right); } .leanrow.r .tag { color: var(--lean-right); }

  .neutral { border-top: 1px solid var(--hairline); padding-top: 12px; margin-top: 10px; font-family: var(--font-serif); font-style: italic; font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; }
  .neutral b { font-style: normal; color: var(--ink); font-weight: 600; }

  .kg-anchor-box { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--hairline); }
  .kg-anchor-title { font-family: var(--font-display); font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tagpill { font-size: 11px; padding: 3px 10px; border: 1px solid var(--hairline); border-radius: 100px; color: var(--ink-soft); background: var(--glass-bg-strong); font-weight: 500; }

  .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; color: var(--ink-faint); font-family: monospace; font-size: 14px; }
  .loader-spinner { animation: spin 1s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<svg style="display: none">
  <filter id="glass-distortion">
    <feTurbulence type="turbulence" baseFrequency="0.006" numOctaves="2" result="noise" />
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" />
  </filter>
</svg>

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  // Stable Core Icons built as native inline react components
  const DashboardIcon = () => (
    <svg className="inline mr-2" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="11" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
  );
  const CommitIcon = () => (
    <svg className="inline mr-1" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><line x1="3" x1="9" y1="12" y2="12"/><line x1="15" x1="21" y1="12" y2="12"/></svg>
  );
  const SearchIcon = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  );
  const ModeIcon = ({ theme }) => (
    theme === 'dark' ? 
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg> :
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  );
  const LoadingIcon = () => (
    <svg className="loader-spinner" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
  );
  const CrashIcon = () => (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2Values"/><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M12 17v4"/><path d="M8 21h8"/></svg>
  );

  const StoryCard = ({ story }) => {
    const [hovered, setHovered] = useState(null);
    return (
      <div className="glass-card">
        <div className="glass-layers"><div className="glass-filter"></div><div className="glass-overlay"></div></div>
        <div className="glass-specular"></div>
        <div className="glass-content">
          <span className="eyebrow-tag">{story.source || 'Intelligence Network'}</span>
          <h2 className="headline">{story.title}</h2>
          <div className="byline">{story.citation || 'Live Triage'}</div>
          <p className="snippet">{story.summary}</p>
          
          <div className="kg-anchor-box">
            <div className="kg-anchor-title"><CommitIcon /> Extracted Anchors</div>
            <div className="tags">
              {(story.graph || []).map(t => <span key={t} className="tagpill">{t}</span>)}
            </div>
          </div>
          
          {story.spectrum && story.spectrum.baseline && (
            <>
              <div className="bias-hit-area" onMouseLeave={() => setHovered(null)}>
                <div className="biasbar">
                  <span className={`seg-left ${hovered === 'l' ? 'active' : ''}`} style={{ width: `${story.spectrum.baseline.left}%` }} onMouseEnter={() => setHovered('l')} />
                  <span className={`seg-center ${hovered === 'c' ? 'active' : ''}`} style={{ width: `${story.spectrum.baseline.center}%` }} onMouseEnter={() => setHovered('c')} />
                  <span className={`seg-right ${hovered === 'r' ? 'active' : ''}`} style={{ width: `${story.spectrum.baseline.right}%` }} onMouseEnter={() => setHovered('r')} />
                </div>
                <div className="leanwrap">
                  <div className={`leanrow l ${hovered === 'l' ? 'expanded' : ''}`}><span className="tag">{story.spectrum.zones?.left?.label}</span>{story.spectrum.zones?.left?.synthesis}</div>
                  <div className={`leanrow c ${hovered === 'c' ? 'expanded' : ''}`}><span className="tag">{story.spectrum.zones?.center?.label}</span>{story.spectrum.zones?.center?.synthesis}</div>
                  <div className={`leanrow r ${hovered === 'r' ? 'expanded' : ''}`}><span className="tag">{story.spectrum.zones?.right?.label}</span>{story.spectrum.zones?.right?.synthesis}</div>
                </div>
              </div>
              <div className="neutral"><b>Objective Synthesis:</b> {story.spectrum.neutral}</div>
            </>
          )}
        </div>
      </div>
    );
  };

  const App = () => {
    const [theme, setTheme] = useState('light');
    const [activeView, setActiveView] = useState('briefing');
    const [dataStore, setDataStore] = useState(null);
    const [isLoading, setIsLoading] = useState(true);

    useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

    useEffect(() => {
      const fetchLiveIntelligence = async () => {
        try {
          const res = await fetch(`database.json?v=${new Date().getTime()}`);
          if (!res.ok) throw new Error("Awaiting Daily AI Build...");
          const liveData = await res.json();
          setDataStore(liveData);
        } catch (err) {
          console.error("Database connection failure:", err);
        } finally {
          setIsLoading(false);
        }
      };
      fetchLiveIntelligence();
    }, []);

    const storiesToShow = useMemo(() => {
      if (!dataStore) return [];
      if (activeView === 'briefing') {
        return [
          ...(dataStore.federalism?.[0] ? [dataStore.federalism[0]] : []),
          ...(dataStore.charter?.[0] ? [dataStore.charter[0]] : []),
          ...(dataStore.indigenous?.[0] ? [dataStore.indigenous[0]] : []),
          ...(dataStore.criminal?.[0] ? [dataStore.criminal[0]] : []),
          ...(dataStore.immigration?.[0] ? [dataStore.immigration[0]] : [])
        ];
      }
      return dataStore[activeView] || [];
    }, [activeView, dataStore]);

    const getCount = (cat) => dataStore?.[cat]?.length || 0;

    return (
      <div className="desktop-layout">
        <nav className="sidebar">
          <div className="wordmark"><span className="tick"></span>The Spread</div>
          <div className="nav-group">
            <div className="nav-label">Live Feeds</div>
            <button className={`nav-item ${activeView === 'briefing' ? 'active' : ''}`} onClick={() => setActiveView('briefing')}>
              <span><DashboardIcon />Daily Briefing</span>
            </button>
            <button className={`nav-item ${activeView === 'federalism' ? 'active' : ''}`} onClick={() => setActiveView('federalism')}>
              <span>Federalism</span>{dataStore && <span className="nav-count">{getCount('federalism')}</span>}
            </button>
            <button className={`nav-item ${activeView === 'charter' ? 'active' : ''}`} onClick={() => setActiveView('charter')}>
              <span>Charter</span>{dataStore && <span className="nav-count">{getCount('charter')}</span>}
            </button>
            <button className={`nav-item ${activeView === 'indigenous' ? 'active' : ''}`} onClick={() => setActiveView('indigenous')}>
              <span>Indigenous-State</span>{dataStore && <span className="nav-count">{getCount('indigenous')}</span>}
            </button>
            <button className={`nav-item ${activeView === 'criminal' ? 'active' : ''}`} onClick={() => setActiveView('criminal')}>
              <span>Criminal Law</span>{dataStore && <span className="nav-count">{getCount('criminal')}</span>}
            </button>
            <button className={`nav-item ${activeView === 'immigration' ? 'active' : ''}`} onClick={() => setActiveView('immigration')}>
              <span>Immigration</span>{dataStore && <span className="nav-count">{getCount('immigration')}</span>}
            </button>
          </div>
        </nav>

        <div className="main-stage">
          <header className="topbar">
            <div className="search-bar">
              <SearchIcon />
              <input type="text" placeholder="Global search disabled during triage..." disabled />
            </div>
            <div className="topbar-actions">
              <button className="btn-icon" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
                <ModeIcon theme={theme} />
              </button>
            </div>
          </header>

          <div className="scroll-area">
            {isLoading ? (
              <div className="loader-container">
                <LoadingIcon />
                <p>Establishing secure connection to live intelligence database...</p>
              </div>
            ) : !dataStore ? (
              <div className="loader-container">
                <CrashIcon />
                <p>Waiting for the 8:00 AM Gemini build to finish generating database.json...</p>
              </div>
            ) : (
              <div>
                {activeView === 'briefing' && (
                  <div className="mb-8 full-width-hero">
                    <h1 className="text-3xl font-extrabold tracking-tight mb-1">The Daily Briefing</h1>
                    <p className="text-xs font-mono opacity-50 uppercase tracking-wider">Apex dossiers synthesized directly by Gemini 2.5 Flash</p>
                  </div>
                )}
                <div className="grid-terminal">
                  {storiesToShow.length > 0 ? storiesToShow.map(story => (
                    <StoryCard key={story.id || Math.random()} story={story} />
                  )) : (
                    <div className="col-span-full text-center opacity-50 mt-10 font-mono text-sm">No critical structural updates detected in this domain over the last 24 hours.</div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
