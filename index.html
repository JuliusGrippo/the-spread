  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }

    -webkit-backdrop-filter: blur(32px) saturate(200%);
    border-right: 1px solid var(--hairline);
    display: flex; flex-direction: column;
    padding: 24px 16px;
    z-index: 50;
  }

  .wordmark .tick { width: 12px; height: 3px; background: var(--brass); border-radius: 2px; }

  .nav-group { margin-bottom: 28px; }
  .nav-label { font-size: 11px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding-left: 12px; }
  
  .nav-item {

    padding: 8px 12px; border-radius: 8px; cursor: pointer; text-align: left;
    transition: all 0.15s; margin-bottom: 2px;

  .nav-item:hover { background: var(--hairline); color: var(--ink); }
  .nav-item.active { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--ink); box-shadow: 0 4px 12px var(--glass-shadow); font-weight: 600; }
  .nav-count { font-size: 11px; font-mono; opacity: 0.5; background: var(--hairline); padding: 2px 6px; border-radius: 6px; }

  /* Main Viewport Window */

  .topbar {
    height: 64px; padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--hairline);
    background: var(--canvas); z-index: 40;

  .glass-card { position: relative; border-radius: 20px; margin-bottom: 24px; z-index: 1; display: flex; flex-direction: column; background: transparent; }

    });

    useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
    useEffect(() => { lucide.createIcons(); });
    useEffect(() => { localStorage.setItem('spread_dossier_v2', JSON.stringify(Array.from(archivedIds))); }, [archivedIds]);

    const toggleArchive = (id) => {
      const s = new Set(archivedIds);
      if (s.has(id)) s.delete(id); else s.add(id);
      setArchivedIds(s);
    };

    const handleSelectTagFromCard = (tag) => {
      setSelectedTag(tag);
      setActiveView('graph_mapping');
    };

    const storiesToShow = useMemo(() => {
      if (activeView === 'briefing') {
        return [DATA_STORE.federalism[0], DATA_STORE.charter[0], DATA_STORE.indigenous[0], DATA_STORE.criminal[0], DATA_STORE.immigration[0]];
      }
      if (activeView === 'dossier') {
        const all = [...DATA_STORE.federalism, ...DATA_STORE.charter, ...DATA_STORE.indigenous, ...DATA_STORE.criminal, ...DATA_STORE.immigration];
        return all.filter(s => archivedIds.has(s.id));
      }
      return DATA_STORE[activeView] || [];
    }, [activeView, archivedIds]);

    return (
      <div className="desktop-layout">
        
        {/* Navigation Sidebar Area */}
        <nav className="sidebar">
          <div className="wordmark"><span className="tick"></span>The Spread</div>
          
          <div className="nav-group">
            <div className="nav-label">Subjects</div>
            <button className={`nav-item ${activeView === 'briefing' ? 'active' : ''}`} onClick={() => setActiveView('briefing')}>
              <span><i data-lucide="layout-dashboard" style={{width:14, height:14, display:'inline', marginRight:8}}></i>Daily Briefing</span>
            </button>
            <button className={`nav-item ${activeView === 'federalism' ? 'active' : ''}`} onClick={() => setActiveView('federalism')}>
              <span>Federalism</span><span className="nav-count">{DATA_STORE.federalism.length}</span>
            </button>
            <button className={`nav-item ${activeView === 'charter' ? 'active' : ''}`} onClick={() => setActiveView('charter')}>
              <span>Charter</span><span className="nav-count">{DATA_STORE.charter.length}</span>
            </button>
            <button className={`nav-item ${activeView === 'indigenous' ? 'active' : ''}`} onClick={() => setActiveView('indigenous')}>
              <span>Indigenous-State</span><span className="nav-count">{DATA_STORE.indigenous.length}</span>
            </button>
            <button className={`nav-item ${activeView === 'criminal' ? 'active' : ''}`} onClick={() => setActiveView('criminal')}>
              <span>Criminal Law</span><span className="nav-count">{DATA_STORE.criminal.length}</span>
            </button>
            <button className={`nav-item ${activeView === 'immigration' ? 'active' : ''}`} onClick={() => setActiveView('immigration')}>
              <span>Immigration</span><span className="nav-count">{DATA_STORE.immigration.length}</span>
            </button>
          </div>

          <div className="nav-group">
            <div className="nav-label">Knowledge Graph</div>
            <button className={`nav-item ${activeView === 'graph_mapping' ? 'active' : ''}`} onClick={() => setActiveView('graph_mapping')}>
              <span><i data-lucide="network" style={{width:14, height:14, display:'inline', marginRight:8}}></i>Mapping Matrix</span>
            </button>
            <button className={`nav-item ${activeView === 'dossier' ? 'active' : ''}`} onClick={() => setActiveView('dossier')}>
              <span><i data-lucide="library" style={{width:14, height:14, display:'inline', marginRight:8}}></i>Your Dossier</span>
              <span className="nav-count" style={{background:'var(--brass-soft)', color:'var(--brass)'}}>{archivedIds.size}</span>
            </button>
          </div>

          <div className="nav-group mt-auto">
            <div className="nav-label">Ecosystem Automation</div>
            <button className={`nav-item ${activeView === 'automation_blueprint' ? 'active' : ''}`} onClick={() => setActiveView('automation_blueprint')}>
              <span><i data-lucide="cpu" style={{width:14, height:14, display:'inline', marginRight:8}}></i>Gemini Integration</span>
            </button>
          </div>
        </nav>

        {/* Main Interface Execution Pane */}
        <div className="main-stage">
          <header className="topbar">
            <div className="search-bar">
              <i data-lucide="search" style={{width:16, height:16, color:'var(--ink-faint)'}}></i>
              <input type="text" placeholder="Global search across living briefs, precedents, and mapped database nodes..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
            </div>
            
            <div className="topbar-actions">
              <span className="text-xs font-mono opacity-50">June 18, 2026 · 09:30 AM Rebuild Complete</span>
              <button className="btn-icon" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
                <i data-lucide={theme === 'dark' ? 'sun' : 'moon'} style={{width:16, height:16}}></i>
              </button>
            </div>
          </header>

          <div className="scroll-area">
            {activeView === 'automation_blueprint' ? (
              <div className="max-w-4xl">
                <h1 className="text-2xl font-bold mb-2">Ecosystem Gemini Pipeline Blueprint</h1>
                <p className="text-sm text-gray-500 mb-6">This script runs on a zero-dollar infrastructure tier inside GitHub Actions every morning, feeding structural data directly into your deployment architecture.</p>
                <pre className="blueprint-text">{GEMINI_PIPELINE_BLUEPRINT}</pre>
              </div>
            ) : activeView === 'graph_mapping' ? (
              <div className="max-w-4xl">
                <h1 className="text-2xl font-bold mb-4">Knowledge Graph Relationship Layer</h1>
                <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
                  {Object.keys(GRAPH_RELATIONS).map(tag => (
                    <span key={tag} className={`tagpill ${selectedTag === tag ? 'bg-amber-500 text-white border-amber-600' : ''}`} style={{whiteSpace:'nowrap'}} onClick={() => setSelectedTag(tag)}>{tag}</span>
                  ))}
                </div>
                
                <div className="glass-card"><div className="glass-layers"><div className="glass-filter"></div></div>
                  <div className="glass-specular"></div>
                  <div className="glass-content">
                    <h2 className="text-lg font-bold mb-4 text-gradient">Active Structural Node: {selectedTag}</h2>
                    <ul className="semantic-list">
                      {GRAPH_RELATIONS[selectedTag]?.map((rel, idx) => (
                        <li key={idx}>
                          <span className="node-type">{rel.type}</span>
                          <span className="node-desc" dangerouslySetInnerHTML={{__html: rel.text}} />
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
              </div>
            ) : (
              <div>
                {activeView === 'briefing' && (
                  <div className="mb-8 full-width-hero">
                    <h1 className="text-3xl font-extrabold tracking-tight mb-1">The Daily Briefing</h1>
                    <p className="text-xs font-mono opacity-50 uppercase tracking-wider">Apex dossiers synthesized from 182 structural indices across Canada</p>
                  </div>
                )}
                <div className="grid-terminal">
                  {storiesToShow.map(story => (
                    <StoryCard key={story.id} story={story} isArchived={archivedIds.has(story.id)} onToggleArchive={toggleArchive} onSelectTag={handleSelectTagFromCard} />
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>

      </div>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
