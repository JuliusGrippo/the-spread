<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Spread | Live Intelligence Terminal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --canvas: #EEF0F3; --ink: #14151A; --ink-soft: #5A5C66; --ink-faint: #8A8C95; --hairline: rgba(20,21,26,0.09); --brass: #A9824C; --glass-bg: rgba(255,255,255,0.55); --lean-left: #2F62D6; --lean-center: #756AA0; --lean-right: #B3473A; }
  * { box-sizing: border-box; } html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--canvas); font-family: -apple-system, sans-serif; }
  .desktop-layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
  .sidebar { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border-right: 1px solid var(--hairline); padding: 24px 16px; }
  .scroll-area { flex: 1; overflow-y: auto; padding: 40px; }
  .glass-card { background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
  .grid-terminal { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 24px; }
  .tagpill { font-size: 10px; background: #E5E7EB; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; font-weight: 700; }
  .source-link { display: inline-block; margin-top: 12px; font-size: 12px; color: var(--brass); text-decoration: underline; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;
  const StoryCard = ({ story }) => (
    <div className="glass-card">
      <div className="flex justify-between items-start mb-2">
        <span className="text-[10px] font-bold uppercase tracking-widest text-gray-500">{story.category}</span>
        <span className="text-[10px] font-mono text-gray-400">{story.source}</span>
      </div>
      <h2 className="text-lg font-bold mb-2">{story.title}</h2>
      <p className="text-sm text-gray-600 mb-4">{story.summary}</p>
      <a href={story.url} target="_blank" className="source-link">Read Original Source →</a>
    </div>
  );

  const App = () => {
    const [data, setData] = useState(null);
    useEffect(() => {
      fetch('database.json?t=' + Date.now()).then(r => r.json()).then(setData);
    }, []);
    
    if (!data) return <div className="p-10">Initializing...</div>;
    
    // High Density: 3 stories per category
    const stories = [
      ...(data.federalism?.slice(0,3) || []),
      ...(data.charter?.slice(0,3) || []),
      ...(data.indigenous?.slice(0,3) || []),
      ...(data.criminal?.slice(0,3) || []),
      ...(data.immigration?.slice(0,3) || [])
    ];

    return (
      <div className="desktop-layout">
        <nav className="sidebar">
          <h1 className="font-bold text-xl mb-10">The Spread</h1>
          <div className="space-y-2">
            {['Federalism', 'Charter', 'Indigenous', 'Criminal', 'Immigration'].map(c => (
              <div key={c} className="text-sm font-medium">{c} ({data[c.toLowerCase()]?.length || 0})</div>
            ))}
          </div>
        </nav>
        <main className="scroll-area">
          <h1 className="text-2xl font-bold mb-8">Daily Briefing</h1>
          <div className="grid-terminal">
            {stories.length > 0 ? stories.map((s, i) => <StoryCard key={i} story={s} />) : <p>No critical structural updates detected in the last 24 hours.</p>}
          </div>
        </main>
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
