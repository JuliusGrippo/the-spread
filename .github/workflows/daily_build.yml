name: Daily Intelligence Triage
on:
  schedule:
    # 9:30 AM EDT (13:30 UTC) on Sun, Mon, Tue, Wed, Thu, Sat
    - cron: '30 13 * * 0,1,2,3,4,6'
    # 10:01 AM EDT (14:01 UTC) strictly on Fridays
    - cron: '1 14 * * 5'
  workflow_dispatch:
jobs:
  rebuild_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Spin up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Engine Dependencies
        run: pip install requests google-genai beautifulsoup4
      - name: Run Gemini 2M Token Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetcher.py
      - name: Save & Deploy New Data
        run: |
          git config --global user.name "The Spread AI"
          git config --global user.email "bot@thespread.ai"
          git add database.json
          git commit -m "Live Intelligence Update: $(date)" || exit 0
          git push
